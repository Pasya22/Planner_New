<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Travel Planner Pro - Bandung Weekend</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', Arial, sans-serif;
      background: #F8FAFC;
      color: #1E293B;
      font-size: 14px;
      line-height: 1.4;
    }

    :root {
      --or: #F97316;
      --ord: #C2410C;
      --nv: #1E293B;
      --nv2: #1E3A5F;
      --tl: #0E7490;
      --gn: #166534;
      --pu: #7C3AED;
      --rd: #DC2626;
      --bd: #E2E8F0;
      --alt: #F1F5F9;
      --wh: #fff;
      --ab: #FEF3C7;
      --ib: #1D4ED8;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
    }

    .hdr {
      background: #1E293B;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 3px solid var(--or);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }

    .hdr h1 {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
    }

    .hd-sub {
      font-size: 10px;
      color: #94A3B8;
      width: 100%;
      margin-top: 4px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
    }

    .bg-or {
      background: var(--or);
    }

    .bg-tl {
      background: var(--tl);
    }

    .bg-gn {
      background: var(--gn);
    }

    .bg-pu {
      background: var(--pu);
    }

    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--bd);
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      position: sticky;
      top: 70px;
      z-index: 99;
    }

    .tab {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: #64748B;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tab.on {
      color: var(--or);
      border-bottom-color: var(--or);
    }

    .tab:active {
      background: var(--alt);
    }

    .pnl {
      display: none;
      padding: 12px;
    }

    .pnl.on {
      display: block;
    }

    .status-bar {
      padding: 10px 12px;
      border-radius: 8px;
      margin: 8px 12px;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-bar.loading {
      background: #EFF6FF;
      color: #1E3A5F;
      border-left: 3px solid var(--tl);
    }

    .status-bar.success {
      background: #DCFCE7;
      color: #166534;
      border-left: 3px solid var(--gn);
    }

    .status-bar.error {
      background: #FEE2E2;
      color: #991B1B;
      border-left: 3px solid var(--rd);
    }

    .status-bar.synced {
      background: #FEF3C7;
      color: #92400E;
      border-left: 3px solid #F59E0B;
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .b-add {
      background: #fff;
      color: var(--or);
      border: 1.5px solid var(--or);
    }

    .b-add:active {
      background: var(--or);
      color: #fff;
    }

    .b-sv {
      background: var(--gn);
      color: #fff;
    }

    .b-cc {
      background: var(--alt);
      color: var(--nv);
      border: 1px solid var(--bd);
    }

    .b-reset {
      background: #FEE2E2;
      color: var(--rd);
      border: 1px solid #FCA5A5;
    }

    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 560px;
    }

    th {
      padding: 10px 8px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    .th-tl {
      background: var(--tl);
    }

    .th-gn {
      background: var(--gn);
    }

    .th-pu {
      background: var(--pu);
    }

    .th-or {
      background: var(--or);
    }

    td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--bd);
      vertical-align: middle;
    }

    tr:nth-child(even) td {
      background: var(--alt);
    }

    .tr-tot td {
      background: var(--ord) !important;
      color: #fff;
      font-weight: 700;
    }

    .tr-gnd td {
      background: var(--or) !important;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
    }

    .mn {
      text-align: right;
      font-weight: 700;
    }

    .iab {
      background: var(--ab);
      color: var(--ib);
      font-weight: 700;
    }

    .bok {
      background: #DCFCE7;
      color: #166534;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
    }

    .best {
      background: #FEF3C7;
      color: #92400E;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
    }

    .ce,
    .cd {
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      display: inline-block;
      margin: 0 2px;
    }

    .ce {
      background: #FEF3C7;
      color: #92400E;
      border: 1px solid #F59E0B;
    }

    .cd {
      background: #FEE2E2;
      color: var(--rd);
      border: 1px solid #FCA5A5;
    }

    .ce:active,
    .cd:active {
      opacity: 0.7;
    }

    .drag-handle {
      cursor: grab;
      color: #94A3B8;
      font-size: 16px;
      user-select: none;
      display: inline-block;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .mbg {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      overflow-y: auto;
    }

    .mbg.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--or);
      padding-bottom: 8px;
    }

    .fg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .fg1 {
      grid-template-columns: 1fr;
    }

    .fld {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .fld label {
      font-size: 11px;
      font-weight: 700;
      color: #64748B;
    }

    .fld input,
    .fld select {
      padding: 8px 10px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
    }

    .fld input:focus,
    .fld select:focus {
      border-color: var(--or);
    }

    .fhi input,
    .fhi select {
      background: var(--ab);
      color: var(--ib);
      font-weight: 700;
      border-color: #F59E0B;
    }

    .mact {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--bd);
    }

    .ac {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .acard {
      background: #fff;
      border: 1.5px solid var(--bd);
      border-radius: 12px;
      padding: 12px;
      flex: 1;
      min-width: 100px;
      text-align: center;
    }

    .al {
      font-size: 11px;
      color: #64748B;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .av {
      font-size: 16px;
      font-weight: 700;
    }

    .pr {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px;
      background: var(--alt);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    @media (min-width: 640px) {
      .pr {
        grid-template-columns: 180px 200px 1fr;
      }
    }

    .pr label {
      font-size: 12px;
      font-weight: 700;
    }

    .pr input {
      padding: 8px 10px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-size: 12px;
      background: var(--ab);
      color: var(--ib);
      font-weight: 700;
      outline: none;
      width: 100%;
    }

    .pr .ht {
      font-size: 10px;
      color: #64748B;
      font-style: italic;
      grid-column: 1 / -1;
    }

    @media (min-width: 640px) {
      .pr .ht {
        grid-column: auto;
      }
    }

    .day-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--or);
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .day-hdr .d-title {
      font-size: 13px;
      font-weight: 700;
      flex: 1;
    }

    .day-hdr input[type="time"],
    .day-hdr input[type="text"] {
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    .day-hdr input[type="text"] {
      width: 130px;
    }

    .del-day {
      background: rgba(220, 38, 38, 0.3);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
    }

    .ib {
      background: #EFF6FF;
      border-left: 3px solid var(--tl);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 11px;
      color: #1E3A5F;
      margin-bottom: 12px;
    }

    .sbar {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bg-nv {
      background: var(--nv2);
    }

    .bg-gn2 {
      background: var(--gn);
    }

    .bg-pu2 {
      background: var(--pu);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top-color: var(--or);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .drag-over td {
      background: #FEF3C7 !important;
      border-top: 2px solid var(--or);
    }

    .dragging td {
      opacity: 0.4;
      background: #EDE9FE !important;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="hdr">
      <span style="font-size:20px">🗺️</span>
      <div style="flex:1">
        <h1>Travel Planner Pro</h1>
        <div class="hd-sub">Bandung Weekend Escape · Live Sync ke Sheets · WIB (UTC+7)</div>
      </div>
      <span class="badge bg-or">CRUD</span>
      <span class="badge bg-tl">DRAG</span>
      <span class="badge bg-gn">LIVE</span>
    </div>

    <div class="tabs">
      <div class="tab on" onclick="switchTab('master')">📋 Master</div>
      <div class="tab" onclick="switchTab('itin')">🗺️ Itinerary</div>
      <div class="tab" onclick="switchTab('budget')">💰 Budget</div>
      <div class="tab" onclick="switchTab('adj')">⚙️ Adjustment</div>
    </div>

    <div id="statusBar" class="status-bar loading">
      <span><span class="spinner"></span> Memuat data dari Google Sheets...</span>
    </div>

    <div id="p-master" class="pnl on"></div>
    <div id="p-itin" class="pnl"></div>
    <div id="p-budget" class="pnl"></div>
    <div id="p-adj" class="pnl"></div>
  </div>

  <div class="mbg" id="mbg">
    <div class="modal">
      <h3 id="mt">Form</h3>
      <div id="mb"></div>
      <div class="mact">
        <button class="btn b-cc" onclick="closeModal()">Batal</button>
        <button class="btn b-sv" onclick="saveModal()">💾 Simpan</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzfY0csFnk1wk-tekV3B8feZVw2Tm0fxeeNuLpcFiWtHhaB_kbT_7OQ06swJmGNykOq/exec';

    // ─── WIB (UTC+7) helpers ────────────────────────────────────────────────

    /**
     * Parse sebuah nilai tanggal dari Sheets menjadi string "YYYY-MM-DD" di zona WIB.
     * Sheets bisa mengirim: "2026-07-01", "7/1/2026", atau angka serial Excel.
     */
    function parseSheetDate(val) {
      if (!val && val !== 0) return '';

      // Angka serial Excel/Sheets (hari sejak 30 Des 1899)
      if (typeof val === 'number') {
        // Koreksi bug Lotus 1900 (Sheets menghitung 29 Feb 1900 yg tidak ada)
        const serial = val > 59 ? val - 1 : val;
        const epoch = new Date(Date.UTC(1900, 0, 1));
        epoch.setUTCDate(epoch.getUTCDate() + serial - 1);
        return epochToWIBDateStr(epoch.getTime());
      }

      const s = String(val).trim();
      if (!s) return '';

      // Sudah format ISO: "2026-07-01" atau "2026-07-01T..."
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
        // Ambil bagian tanggal saja, tidak perlu konversi zona (sudah benar)
        return s.substring(0, 10);
      }

      // Format M/D/YYYY atau D/M/YYYY (Sheets locale Indonesia = D/M/YYYY)
      const parts = s.split('/');
      if (parts.length === 3) {
        // Coba deteksi apakah M/D/YYYY atau D/M/YYYY
        // Sheets Indonesia biasanya D/M/YYYY
        let d = parseInt(parts[0]), m = parseInt(parts[1]), y = parseInt(parts[2]);
        // Jika bagian pertama > 12, pasti hari
        // Jika bagian kedua > 12, berarti M/D/YYYY — tukar
        if (m > 12) { [d, m] = [m, d]; }
        return y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      }

      // Fallback: coba parse lalu convert ke WIB
      const ms = Date.parse(s);
      if (!isNaN(ms)) return epochToWIBDateStr(ms);

      return s.substring(0, 10);
    }

    /**
     * Parse nilai waktu dari Sheets menjadi string "HH:MM" di WIB.
     * Sheets bisa kirim: "14:39", "14:39:00", angka desimal (fraksi hari), atau ISO string.
     */
    function parseSheetTime(val) {
      if (!val && val !== 0) return '';

      // Angka desimal fraksi hari (misal 0.6104... = 14:39)
      if (typeof val === 'number') {
        if (val < 1) {
          // Fraksi hari murni
          const totalMin = Math.round(val * 24 * 60);
          const h = Math.floor(totalMin / 60) % 24;
          const m = totalMin % 60;
          return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
        }
        // Angka serial >= 1: ada komponen tanggal + waktu, ambil bagian waktu saja
        const frac = val - Math.floor(val);
        const totalMin = Math.round(frac * 24 * 60);
        const h = Math.floor(totalMin / 60) % 24;
        const m = totalMin % 60;
        return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
      }

      const s = String(val).trim();
      if (!s) return '';

      // Format HH:MM atau HH:MM:SS
      const tmMatch = s.match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
      if (tmMatch) {
        return String(parseInt(tmMatch[1])).padStart(2, '0') + ':' + tmMatch[2];
      }

      // ISO datetime string — convert ke WIB
      const ms = Date.parse(s);
      if (!isNaN(ms)) {
        return epochToWIBTimeStr(ms);
      }

      return s.substring(0, 5);
    }

    /** Konversi epoch ms ke "YYYY-MM-DD" di WIB (UTC+7) */
    function epochToWIBDateStr(ms) {
      const wib = new Date(ms + 7 * 3600 * 1000);
      const y = wib.getUTCFullYear();
      const m = String(wib.getUTCMonth() + 1).padStart(2, '0');
      const d = String(wib.getUTCDate()).padStart(2, '0');
      return y + '-' + m + '-' + d;
    }

    /** Konversi epoch ms ke "HH:MM" di WIB (UTC+7) */
    function epochToWIBTimeStr(ms) {
      const wib = new Date(ms + 7 * 3600 * 1000);
      return String(wib.getUTCHours()).padStart(2, '0') + ':' + String(wib.getUTCMinutes()).padStart(2, '0');
    }

    /** Tampilan tanggal: "03 Jul 2026" */
    const BULAN = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agt', 'Sep', 'Okt', 'Nov', 'Des'];
    function fmtD(d) {
      if (!d) return '-';
      const [y, m, dd] = String(d).substring(0, 10).split('-');
      return dd + ' ' + BULAN[parseInt(m) - 1] + ' ' + y;
    }

    /** Timestamp WIB sekarang untuk status bar */
    function nowWIB() {
      return new Date().toLocaleTimeString('id-ID', { timeZone: 'Asia/Jakarta', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ─── Normalise data dari Sheets ─────────────────────────────────────────

    function normalizeTrain(t) {
      return {
        id: Number(t.id),
        name: t.name || '',
        route: t.route || '',
        depDate: parseSheetDate(t.depDate),
        depTime: parseSheetTime(t.depTime),
        arrDate: parseSheetDate(t.arrDate),
        arrTime: parseSheetTime(t.arrTime),
        price: Number(t.price) || 0,
        pax: Number(t.pax) || 1,
        status: t.status || 'estimasi',
      };
    }

    function normalizeHotel(h) {
      return {
        id: Number(h.id),
        name: h.name || '',
        city: h.city || '',
        checkIn: parseSheetDate(h.checkIn),
        checkOut: parseSheetDate(h.checkOut),
        pricePerNight: Number(h.pricePerNight) || 0,
        status: h.status || 'estimasi',
      };
    }

    function normalizeActivity(a) {
      return {
        id: Number(a.id),
        act: a.act || '',
        loc: a.loc || '',
        base: Number(a.base) || 0,
        dur: Number(a.dur) || 0,
      };
    }

    function normalizeDay(d) {
      return {
        id: Number(d.id),
        label: d.label || 'Hari',
        startTime: parseSheetTime(d.startTime) || '08:00',
        activities: (d.activities || []).map(normalizeActivity),
      };
    }

    // ─── App state ──────────────────────────────────────────────────────────

    let S = {
      trains: [], hotels: [],
      params: { faktor: 1.0, speed: 30, consumption: 35, fuelPrice: 10000 },
      days: [], budgetDays: [], budgetAwal: 2500000
    };

    let nextIds = { tr: 1, ht: 1, day: 1, act: 1, bu: 1 };
    let modalContext = null;
    let dragSrc = null;
    let isLoading = false;
    let saveDebounce = null;

    // ─── Helpers ────────────────────────────────────────────────────────────

    const rp = n => 'Rp ' + Math.round(n).toLocaleString('id-ID');
    const nights = (ci, co) => Math.max(0, Math.round((new Date(co) - new Date(ci)) / 86400000));
    const t2m = t => { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; };
    const m2t = m => { const h = Math.floor(m / 60) % 24, mm = m % 60; return String(h).padStart(2, '0') + ':' + String(mm).padStart(2, '0'); };
    const aMin = b => Math.round(b * (S.params.faktor || 1));
    const bbm = day => {
      const tot = day.activities.reduce((a, x) => a + aMin(x.base), 0);
      return Math.round(tot / 60 * S.params.speed / S.params.consumption * S.params.fuelPrice);
    };
    const durStr = (dd, dt, ad, at) => {
      if (!dd || !dt || !ad || !at) return '-';
      const d = (new Date(ad + 'T' + at)) - (new Date(dd + 'T' + dt));
      if (d < 0) return '-';
      const m = d / 60000;
      return Math.floor(m / 60) + 'j ' + Math.round(m % 60) + 'm';
    };

    // ─── Status bar ─────────────────────────────────────────────────────────

    function showStatus(message, type = 'loading') {
      const bar = document.getElementById('statusBar');
      const icons = { loading: '<span class="spinner"></span>', success: '✅', error: '❌', synced: '☁️' };
      bar.innerHTML = `<span style="display:flex;align-items:center;gap:8px">${icons[type] || 'ℹ️'} ${message}</span><span style="font-size:10px;color:#64748B">WIB ${nowWIB()}</span>`;
      bar.className = `status-bar ${type}`;
      if (type !== 'loading') {
        setTimeout(() => {
          if (bar.className === `status-bar ${type}`) {
            bar.innerHTML = `<span>✅ Data siap</span><span style="font-size:10px;color:#64748B">WIB ${nowWIB()}</span>`;
            bar.className = 'status-bar success';
          }
        }, 4000);
      }

    // ─── Load dari Sheets ───────────────────────────────────────────────────

    async function loadFromSheets() {
      if (isLoading) return;
      isLoading = true;
      showStatus('Mengambil data dari Google Sheets...', 'loading');
      try {
        const res = await fetch(`${GAS_URL}?action=load&t=${Date.now()}`);
        const result = await res.json();

        if (result.status === 'success' && result.data) {
          const d = result.data;
          if (d.transports) {
            S.trains = (d.transports.trains || []).map(normalizeTrain);
            S.hotels = (d.transports.hotels || []).map(normalizeHotel);
          }
          if (d.itineraries && d.itineraries.days) {
            S.days = d.itineraries.days.map(normalizeDay);
          }
          if (d.budgets) {
            S.budgetDays = d.budgets.days || [];
            S.budgetAwal = d.budgets.budgetAwal || 2500000;
          }
          if (d.tripInfo && d.tripInfo.params) {
            S.params = d.tripInfo.params;
          }
          rebuildNextIds();
          showStatus('Data berhasil dimuat dari Google Sheets!', 'success');
          renderAll();
        } else {
          showStatus('Gagal memuat: ' + (result.message || 'Unknown error') + ' — menampilkan data default.', 'error');
          loadDefaultData();
        }
      } catch (err) {
        console.error('Load error:', err);
        showStatus('Gagal konek ke Google Sheets — menampilkan data default.', 'error');
        loadDefaultData();
      }
      isLoading = false;
    }

    function rebuildNextIds() {
      S.trains.forEach(t => { if (t.id >= nextIds.tr) nextIds.tr = t.id + 1; });
      S.hotels.forEach(h => { if (h.id >= nextIds.ht) nextIds.ht = h.id + 1; });
      S.days.forEach(d => {
        if (d.id >= nextIds.day) nextIds.day = d.id + 1;
        d.activities.forEach(a => { if (a.id >= nextIds.act) nextIds.act = a.id + 1; });
      });
      S.budgetDays.forEach(bd => {
        (bd.items || []).forEach(i => { if (i.id >= nextIds.bu) nextIds.bu = i.id + 1; });
      });
    }

    // ─── Save ke Sheets ─────────────────────────────────────────────────────

    async function saveToSheets() {
      showStatus('Menyimpan ke Google Sheets...', 'loading');
      const payload = {
        transports: { trains: S.trains, hotels: S.hotels },
        itineraries: { days: S.days },
        budgets: { days: S.budgetDays, budgetAwal: S.budgetAwal },
        tripInfo: { params: S.params }
      };
      const fd = new FormData();
      fd.append('action', 'save');
      fd.append('data', JSON.stringify(payload));
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: fd });
        const result = await res.json();
        if (result.status === 'success') {
          showStatus('Tersimpan ke Google Sheets!', 'success');
        } else {
          showStatus('Gagal menyimpan: ' + (result.message || ''), 'error');
        }
      } catch (err) {
        console.error('Save error:', err);
        showStatus('Gagal menyimpan ke Google Sheets!', 'error');
      }
    }

    // ─── Day ops ────────────────────────────────────────────────────────────

    function addDay() {
      mutate(() => {
        const newId = nextIds.day++;
        S.days.push({ id: newId, label: 'Hari Baru ' + (S.days.length + 1), startTime: '08:00', activities: [] });
        S.budgetDays.push({ dayId: newId, items: [] });
      });
    }

    function delDay(id) {
      if (!confirm('Hapus hari ini beserta semua aktivitasnya?')) return;
      mutate(() => {
        S.days = S.days.filter(d => d.id !== id);
        S.budgetDays = S.budgetDays.filter(b => b.dayId !== id);
      });
    }

    function deleteItem(type, ...args) {
      if (!confirm('Hapus item ini?')) return;
      mutate(() => {
        if (type === 'train') S.trains = S.trains.filter(x => x.id !== args[0]);
        else if (type === 'hotel') S.hotels = S.hotels.filter(x => x.id !== args[0]);
        else if (type === 'act') {
          const day = S.days.find(d => d.id === args[0]);
          if (day) day.activities = day.activities.filter(x => x.id !== args[1]);
        }
        else if (type === 'budget') {
          const bd = S.budgetDays.find(b => b.dayId === args[0]);
          if (bd) bd.items = bd.items.filter(x => x.id !== args[1]);
        }
      });
    }

    // ─── Drag & Drop ────────────────────────────────────────────────────────

    function onDragStart(e, type, id, dayId) {
      dragSrc = { type, id: String(id), dayId };
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => e.target.closest('tr')?.classList.add('dragging'), 0);
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const tr = e.target.closest('tr');
      document.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
      if (tr) tr.classList.add('drag-over');
    }

    function onDrop(e, type, dayId) {
      e.preventDefault();
      document.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
      document.querySelectorAll('tr.dragging').forEach(r => r.classList.remove('dragging'));
      const target = e.target.closest('tr');
      if (!target || !dragSrc) return;

      mutate(() => {
        if (type === 'train' && dragSrc.type === 'train') {
          reorder(S.trains, parseInt(dragSrc.id), parseInt(target.dataset.id));
        } else if (type === 'hotel' && dragSrc.type === 'hotel') {
          reorder(S.hotels, parseInt(dragSrc.id), parseInt(target.dataset.id));
        } else if (type === 'act' && dragSrc.type === 'act') {
          const day = S.days.find(d => d.id === dayId);
          if (day) reorder(day.activities, parseInt(dragSrc.id), parseInt(target.dataset.aid));
        }
      });
      dragSrc = null;
    }

    function reorder(arr, fromId, toId) {
      const fi = arr.findIndex(x => x.id === fromId);
      const ti = arr.findIndex(x => x.id === toId);
      if (fi >= 0 && ti >= 0 && fi !== ti) {
        const [item] = arr.splice(fi, 1);
        arr.splice(ti, 0, item);
      }
    }

    function saveModal() {
      const { type, mode, args } = modalContext;
      const gv = id => document.getElementById(id)?.value || '';
      const gn = id => parseFloat(document.getElementById(id)?.value) || 0;
      const gi = id => parseInt(document.getElementById(id)?.value) || 1;

      mutate(() => {
        if (type === 'train') {
          const obj = { name: gv('fn'), route: gv('fr'), depDate: gv('fdd'), depTime: gv('fdt'), arrDate: gv('fad'), arrTime: gv('fat'), price: gn('fp'), pax: gi('fpx'), status: gv('fs') };
          if (mode === 'add') { obj.id = nextIds.tr++; S.trains.push(obj); }
          else { const i = S.trains.findIndex(x => x.id === args[0]); if (i >= 0) { obj.id = args[0]; S.trains[i] = obj; } }
        } else if (type === 'hotel') {
          const obj = { name: gv('fn'), city: gv('fc'), checkIn: gv('fci'), checkOut: gv('fco'), pricePerNight: gn('fp'), status: gv('fs') };
          if (mode === 'add') { obj.id = nextIds.ht++; S.hotels.push(obj); }
          else { const i = S.hotels.findIndex(x => x.id === args[0]); if (i >= 0) { obj.id = args[0]; S.hotels[i] = obj; } }

      });
      html += `<tr class="tr-tot"><td colspan="8" style="text-align:right">Total Penginapan</td><td class="mn">${rp(thn)}</td><td colspan="2"></td></tr>
      <tr class="tr-gnd"><td colspan="8" style="text-align:right">Grand Total</td><td class="mn">${rp(tkt + thn)}</td><td colspan="2"></td></tr>
      </tbody></table></div></div>`;

      // Params motor
      const p = S.params;
      html += `<div class="sbar bg-nv">⚙️ Parameter Motor</div>
      <div class="pr"><label>⏱ Faktor Waktu</label><input type="number" step="0.1" min="0.5" max="3" value="${p.faktor}" onchange="mutate(()=>{S.params.faktor=parseFloat(this.value)})"><span class="ht">1.0=Normal · 1.3=Macet · 0.8=Lancar</span></div>
      <div class="pr"><label>🏎 Kecepatan (km/j)</label><input type="number" step="1" value="${p.speed}" onchange="mutate(()=>{S.params.speed=parseFloat(this.value)})"><span class="ht">Rata-rata motor di Bandung</span></div>
      <div class="pr"><label>⛽ Konsumsi (km/ltr)</label><input type="number" step="1" value="${p.consumption}" onchange="mutate(()=>{S.params.consumption=parseFloat(this.value)})"><span class="ht">Efisiensi motor rental</span></div>
      <div class="pr"><label>💸 Harga BBM/ltr</label><input type="number" step="500" value="${p.fuelPrice}" onchange="mutate(()=>{S.params.fuelPrice=parseFloat(this.value)})"><span class="ht">Harga BBM saat ini (Rp)</span></div>`;

      document.getElementById('p-master').innerHTML = html;
    }

    function renderItinerary() {
      let html = `<div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:13px;font-weight:700;color:var(--nv2)">📅 Hari-hari di Bandung (WIB)</span>
        <button class="btn b-add" onclick="addDay()">+ Tambah Hari</button>
      </div>`;

      S.days.forEach((day, idx) => {
        html += `<div style="margin-bottom:16px">
          <div class="day-hdr">
            <span class="drag-handle" style="color:rgba(255,255,255,.6)">☰</span>
            <span class="d-title">📍 Hari ${idx + 1}</span>
            <input type="text" value="${day.label}" onchange="mutate(()=>{S.days.find(d=>d.id===${day.id}).label=this.value})">
            <span style="font-size:10px">Mulai (WIB):</span>
            <input type="time" value="${day.startTime}" onchange="mutate(()=>{S.days.find(d=>d.id===${day.id}).startTime=this.value})">
            <button class="btn b-add" onclick="openModal('activity','add',${day.id})">+ Aktivitas</button>
            <button class="del-day" onclick="delDay(${day.id})">🗑 Hapus</button>
          </div>
          <div class="table-wrapper"><table><thead><tr>
            <th class="th-or" style="width:32px"></th>
            <th class="th-or">Waktu (WIB)</th>
            <th class="th-or">Aktivitas</th><th class="th-or">Lokasi</th>
            <th class="th-or">Perj. (mnt)</th><th class="th-or">Durasi (mnt)</th>
            <th class="th-or">Aktual (mnt)</th><th class="th-or">Aksi</th>
          </tr></thead><tbody>`;
        let cur = t2m(day.startTime);
        day.activities.forEach(a => {
          const act = aMin(a.base);
          html += `<tr draggable="true" data-aid="${a.id}" data-dayid="${day.id}"
            ondragstart="onDragStart(event,'act','${a.id}',${day.id})"
            ondragover="onDragOver(event)" ondrop="onDrop(event,'act',${day.id})">
            <td><span class="drag-handle">☰</span></td>
            <td style="font-weight:700;color:var(--tl);white-space:nowrap">${m2t(cur)} WIB</td>
            <td>${a.act}</td><td>${a.loc}</td>
            <td style="text-align:center;background:var(--ab);font-weight:700;color:var(--ib)">${a.base}</td>
            <td style="text-align:center;background:var(--ab);font-weight:700;color:var(--ib)">${a.dur}</td>
            <td style="text-align:center">${act}</td>
            <td style="white-space:nowrap">
              <span class="ce" onclick="openModal('activity','edit',${day.id},${a.id})">✏️</span>
              <span class="cd" onclick="deleteItem('act',${day.id},${a.id})">🗑</span>
            </td>
          </tr>`;
          cur += a.dur + act;
        });
        html += `</tbody></table></div></div>`;
      });
      document.getElementById('p-itin').innerHTML = html;
    }

    function renderBudget() {
      const tkt = S.trains.reduce((a, t) => a + t.price * t.pax, 0);
      const thn = S.hotels.reduce((a, h) => a + h.pricePerNight * nights(h.checkIn, h.checkOut), 0);
      let grand = tkt + thn;

      let html = `<div style="margin-bottom:16px"><div class="sbar bg-pu2">🚆 Transportasi & Penginapan Antar Kota</div>
      <div class="table-wrapper"><table><thead><tr>
        <th class="th-pu">#</th><th class="th-pu">Kategori</th><th class="th-pu" style="text-align:right">Total</th>
      </tr></thead><tbody>`;
      [...S.trains.map(t => ['🚆 ' + t.name, t.price * t.pax]), ...S.hotels.map(h => ['🏨 ' + h.name, h.pricePerNight * nights(h.checkIn, h.checkOut)])].forEach((r, i) => {
        html += `<tr><td>${i + 1}</td><td>${r[0]}</td><td class="mn" style="color:var(--gn)">${rp(r[1])}</td></tr>`;
      });
      html += `<tr class="tr-tot"><td colspan="2">Total</td><td class="mn">${rp(tkt + thn)}</td></tr></tbody></table></div></div>`;

      S.days.forEach(day => {
        let bd = S.budgetDays.find(x => x.dayId === day.id);
        if (!bd) { bd = { dayId: day.id, items: [] }; S.budgetDays.push(bd); }
        const b = bbm(day);
        const dt = bd.items.reduce((a, x) => a + x.amount, 0) + b;
        grand += dt;

        html += `<div style="margin-bottom:16px"><div class="sbar bg-or">📅 Budget ${day.label} <button class="btn b-add" onclick="openModal('budget','add',${day.id})">+ Item</button></div>
        <div class="table-wrapper"><table><thead><tr>
          <th class="th-gn">#</th><th class="th-gn">Kategori</th>
          <th class="th-gn" style="text-align:right">Budget</th><th class="th-gn">Aksi</th>
        </tr></thead><tbody>
        <tr><td>0</td><td>⛽ BBM Motor (otomatis)</td><td class="mn">${rp(b)}</td><td>-</td></tr>`;
        bd.items.forEach((it, i) => {
          html += `<tr><td>${i + 1}</td><td>${it.cat}</td>
          <td class="mn iab">${rp(it.amount)}</td>
          <td style="white-space:nowrap">
            <span class="ce" onclick="openModal('budget','edit',${day.id},${it.id})">✏️</span>
            <span class="cd" onclick="deleteItem('budget',${day.id},${it.id})">🗑</span>
          </td></tr>`;
        });
        html += `<tr class="tr-tot"><td colspan="2">Total ${day.label}</td><td class="mn">${rp(dt)}</td><td></td></tr>
        </tbody></table></div></div>`;
      });

      const sisa = S.budgetAwal - grand;
      html += `<div><div class="sbar bg-nv">📊 Summary Budget</div>
      <div class="ac">
        <div class="acard"><div class="al">🎯 Budget Awal</div>
          <input type="number" step="50000" value="${S.budgetAwal}" style="width:100%;text-align:center;font-size:14px;font-weight:700;border:1.5px solid var(--bd);border-radius:8px;padding:6px;background:var(--ab);color:var(--ib)"
          onchange="mutate(()=>{S.budgetAwal=parseFloat(this.value)})">
        </div>
        <div class="acard"><div class="al">🔥 Total Estimasi</div><div class="av" style="color:var(--or)">${rp(grand)}</div></div>
        <div class="acard" style="border-color:${sisa >= 0 ? 'var(--gn)' : 'var(--rd)'}">
          <div class="al">${sisa >= 0 ? '✅' : '⚠️'} Sisa Dana</div>
          <div class="av" style="color:${sisa >= 0 ? 'var(--gn)' : 'var(--rd)'}">${rp(sisa)}</div>
        </div>
      </div></div>`;

      document.getElementById('p-budget').innerHTML = html;
    }

    function renderAdjustment() {
      const tkt = S.trains.reduce((a, t) => a + t.price * t.pax, 0);
      const thn = S.hotels.reduce((a, h) => a + h.pricePerNight * nights(h.checkIn, h.checkOut), 0);
      let grand = tkt + thn;
      S.days.forEach(day => {
        const bd = S.budgetDays.find(x => x.dayId === day.id);
        grand += (bd ? bd.items.reduce((a, x) => a + x.amount, 0) : 0) + bbm(day);
      });
      const sisa = S.budgetAwal - grand;

      let html = `<div class="sbar bg-tl">⚙️ Parameter Perjalanan</div>
      <div class="pr"><label>⏱ Faktor Waktu</label><input type="number" step="0.1" min="0.5" max="3" value="${S.params.faktor}" onchange="mutate(()=>{S.params.faktor=parseFloat(this.value)})"><span class="ht">1.0=Normal · 1.3=Macet · 0.8=Lancar</span></div>
      <div class="pr"><label>🏎 Kecepatan (km/j)</label><input type="number" step="1" value="${S.params.speed}" onchange="mutate(()=>{S.params.speed=parseFloat(this.value)})"><span class="ht">Rata-rata kecepatan motor</span></div>
      <div class="pr"><label>⛽ Konsumsi (km/ltr)</label><input type="number" step="1" value="${S.params.consumption}" onchange="mutate(()=>{S.params.consumption=parseFloat(this.value)})"><span class="ht">Efisiensi motor</span></div>
      <div class="pr"><label>💸 Harga BBM/ltr</label><input type="number" step="500" value="${S.params.fuelPrice}" onchange="mutate(()=>{S.params.fuelPrice=parseFloat(this.value)})"><span class="ht">Harga BBM saat ini (Rp)</span></div>
      ${S.days.map(d => `<div class="pr"><label>⏰ Jam Mulai — ${d.label}</label><input type="time" value="${d.startTime}" onchange="mutate(()=>{S.days.find(x=>x.id===${d.id}).startTime=this.value})"><span class="ht">Jam mulai hari ini (WIB)</span></div>`).join('')}

      <div style="margin-top:16px;padding:14px;background:${sisa >= 0 ? '#DCFCE7' : '#FEE2E2'};border-radius:10px;text-align:center">
        <div style="font-size:12px;color:${sisa >= 0 ? '#166534' : '#991B1B'};margin-bottom:6px">${sisa >= 0 ? '✅ Budget aman' : '⚠️ Budget kurang'}</div>
        <div style="font-size:20px;font-weight:700;color:${sisa >= 0 ? 'var(--gn)' : 'var(--rd)'}">${rp(Math.abs(sisa))}</div>
        <div style="font-size:11px;color:#64748B;margin-top:4px">${sisa >= 0 ? 'sisa dana' : 'kekurangan'}</div>
      </div>

      <button class="btn b-reset" style="margin-top:14px" onclick="if(confirm('Reset semua ke default?')) loadDefaultData()">🔄 Reset ke Default</button>`;

      document.getElementById('p-adj').innerHTML = html;
    }

    // ─── Tab switching ───────────────────────────────────────────────────────

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
      document.querySelectorAll('.pnl').forEach(p => p.classList.remove('on'));
      const idx = { master: 0, itin: 1, budget: 2, adj: 3 }[name];
      document.querySelectorAll('.tab')[idx].classList.add('on');
      document.getElementById(`p-${name}`).classList.add('on');
    }

    // Expose globals
    window.switchTab = switchTab;
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.saveModal = saveModal;
    window.deleteItem = deleteItem;
    window.addDay = addDay;
    window.delDay = delDay;
    window.onDragStart = onDragStart;
    window.onDragOver = onDragOver;
    window.onDrop = onDrop;
    window.mutate = mutate;
    window.loadDefaultData = loadDefaultData;

    // Boot
    loadFromSheets();
  </script>
</body>

</html>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzwBqHsm10ZufbBMHzNOqUreo8jpfCBjK28ZWQ9Pqsl3_nFeQAx3Ns0TNU1Z4maLQIP/exec';

  const DEF = {
    trains: [
      { id: 1, name: "Sri Tanjung (Ekonomi)", route: "Wonokromo → Lempuyangan", depDate: "2026-07-01", depTime: "14:39", arrDate: "2026-07-01", arrTime: "19:33", price: 150000, pax: 2, status: "estimasi" },
      { id: 2, name: "Lodaya (Eksekutif)", route: "Yogyakarta → Bandung", depDate: "2026-07-02", depTime: "20:01", arrDate: "2026-07-03", arrTime: "03:14", price: 220000, pax: 2, status: "estimasi" },
      { id: 3, name: "Malabar (Eksekutif)", route: "Bandung → Malang", depDate: "2026-07-05", depTime: "18:10", arrDate: "2026-07-06", arrTime: "06:52", price: 180000, pax: 2, status: "estimasi" },
    ],
    hotels: [
      { id: 1, name: "Penginapan Yogyakarta (Transit)", city: "Yogyakarta", checkIn: "2026-07-01", checkOut: "2026-07-02", pricePerNight: 89000, status: "konfirmasi" },
      { id: 2, name: "Dreamstay Bandung", city: "Bandung", checkIn: "2026-07-03", checkOut: "2026-07-05", pricePerNight: 0, status: "estimasi" },
    ],
    params: { faktor: 1.0, speed: 30, consumption: 35, fuelPrice: 10000 },
    days: [
      {
        id: 1, label: "Jumat, 03 Jul 2026", startTime: "06:00", activities: [
          { id: 1, act: "Sarapan Bubur Kang Dedi", loc: "Jl. Sudirman", base: 15, dur: 40 },
          { id: 2, act: "Beli Pukis Lumer", loc: "Leuwi Panjang", base: 20, dur: 15 },
          { id: 3, act: "Titip Koper", loc: "Dreamstay", base: 15, dur: 10 },
          { id: 4, act: "Ke Al Jabbar", loc: "Bandung Timur", base: 25, dur: 45 },
          { id: 5, act: "Main Sepeda & Sunset", loc: "Summarecon Bandung", base: 15, dur: 105 },
          { id: 6, act: "Makan Malam", loc: "Summarecon", base: 0, dur: 45 },
          { id: 7, act: "Kembali ke Dreamstay", loc: "Dreamstay", base: 25, dur: 0 },
        ]
      },
      {
        id: 2, label: "Sabtu, 04 Jul 2026", startTime: "03:00", activities: [
          { id: 1, act: "Bangun & Beli Bekal", loc: "Dreamstay / Indomaret", base: 5, dur: 15 },
          { id: 2, act: "Berangkat ke Cukul", loc: "Pangalengan", base: 90, dur: 0 },
          { id: 3, act: "Sunrise Point", loc: "Sunrise Point Cukul", base: 0, dur: 120 },
          { id: 4, act: "Sarapan", loc: "Cukul", base: 0, dur: 90 },
          { id: 5, act: "Picnic & Grill Lembang", loc: "Kebon Pinus Lembang", base: 120, dur: 300 },
          { id: 6, act: "Makan Malam & Istirahat", loc: "Dreamstay", base: 60, dur: 60 },
        ]
      },
      {
        id: 3, label: "Minggu, 05 Jul 2026", startTime: "07:00", activities: [
          { id: 1, act: "Sarapan & Beli Tiramisusu", loc: "Bandung / Chocomory", base: 30, dur: 60 },
          { id: 2, act: "Ke Rumah Aspol", loc: "Bandung", base: 20, dur: 160 },
          { id: 3, act: "Check-out & Kembalikan Motor", loc: "Dreamstay → Stasiun", base: 20, dur: 40 },
          { id: 4, act: "Tunggu Kereta Malabar", loc: "Stasiun Bandung", base: 0, dur: 0 },
        ]
      },
    ],
    budgetDays: [
      { dayId: 1, items: [{ id: 1, cat: "Sarapan Bubur", amount: 30000 }, { id: 2, cat: "Pukis Lumer", amount: 40000 }, { id: 3, cat: "Makan Siang", amount: 50000 }, { id: 4, cat: "Makan Malam", amount: 75000 }, { id: 5, cat: "Parkir", amount: 10000 }, { id: 6, cat: "Cadangan", amount: 50000 }] },
      { dayId: 2, items: [{ id: 1, cat: "Bekal Sunrise", amount: 25000 }, { id: 2, cat: "Sarapan Cukul", amount: 40000 }, { id: 3, cat: "Grill Lembang", amount: 150000 }, { id: 4, cat: "Makan Malam", amount: 75000 }, { id: 5, cat: "Parkir", amount: 15000 }, { id: 6, cat: "Cadangan", amount: 50000 }] },
      { dayId: 3, items: [{ id: 1, cat: "Sarapan", amount: 40000 }, { id: 2, cat: "Tiramisusu Chocomory", amount: 120000 }, { id: 3, cat: "Makan Siang", amount: 60000 }, { id: 4, cat: "Parkir", amount: 10000 }, { id: 5, cat: "Cadangan", amount: 50000 }] },
    ],
    budgetAwal: 2500000,
  };

  let S = JSON.parse(JSON.stringify(DEF));
  let NI = { tr: 10, ht: 10, day: 10, act: 100, bu: 100 };
  let MCX = {};
  let dragSrc = null, dragDayId = null;
  let syncStatus = '';

  async function loadLocal() {
    try {
      const r = await window.storage.get('tpv3');
      if (r && r.value) S = JSON.parse(r.value);
      const n = await window.storage.get('tpni3');
      if (n && n.value) NI = JSON.parse(n.value);
    } catch (e) { }
  }
  async function saveLocal() {
    try {
      await window.storage.set('tpv3', JSON.stringify(S));
      await window.storage.set('tpni3', JSON.stringify(NI));
    } catch (e) { }
  }

  const rp = n => 'Rp ' + Math.round(n).toLocaleString('id-ID');
  const dur = (dd, dt, ad, at) => {
    const d = (new Date(ad + 'T' + at)) - (new Date(dd + 'T' + dt));
    if (d < 0) return '-';
    const m = d / 60000; return Math.floor(m / 60) + 'j ' + Math.round(m % 60) + 'm';
  };
  const nights = (ci, co) => Math.max(0, Math.round((new Date(co) - new Date(ci)) / 86400000));
  const fmtD = d => { if (!d) return '-'; const [y, m, dd] = d.split('-'); const mn = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agt', 'Sep', 'Okt', 'Nov', 'Des']; return dd + ' ' + mn[parseInt(m) - 1] + ' ' + y; };
  const t2m = t => { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; };
  const m2t = m => { const h = Math.floor(m / 60) % 24, mm = m % 60; return String(h).padStart(2, '0') + ':' + String(mm).padStart(2, '0'); };
  const aMin = b => Math.round(b * (S.params.faktor || 1));
  const bbm = day => {
    const bd = S.budgetDays.find(x => x.dayId === day.id);
    const d = S.days.find(x => x.id === day.id);
    if (!d) return 0;
    const tot = d.activities.reduce((a, x) => a + aMin(x.base), 0);
    return Math.round(tot / 60 * S.params.speed / S.params.consumption * S.params.fuelPrice);
  };

  function sw(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.pnl').forEach(p => p.classList.remove('on'));
    const idx = ['master', 'itin', 'budget', 'adj', 'sync'].indexOf(name);
    document.querySelectorAll('.tab')[idx].classList.add('on');
    document.getElementById('p-' + name).classList.add('on');
    render();
  }

  function render() { rMaster(); rItin(); rBudget(); rAdj(); rSync(); }

  function rMaster() {
    const tkt = S.trains.reduce((a, t) => a + t.price * t.pax, 0);
    const thn = S.hotels.reduce((a, h) => a + h.pricePerNight * nights(h.checkIn, h.checkOut), 0);
    let h = `<div class="ib">💡 Drag ☰ untuk reorder baris. Klik <b>Edit/Hapus</b> untuk CRUD. Data sync ke Google Sheets via tab ☁️ Sheets Sync.</div>`;

    h += `<div class="sg"><div class="sbar bg-nv">🚆 Tiket kereta <div style="display:flex;gap:6px"><button class="btn b-add" onclick="om('train','add')">+ Tambah tiket</button></div></div>`;
    h += `<div style="overflow-x:auto"><table style="table-layout:auto"><thead><tr>
    <th class="th-tl" style="width:24px"></th><th class="th-tl" style="width:20px">#</th>
    <th class="th-tl" style="width:140px">Nama KA</th><th class="th-tl" style="width:150px">Rute</th>
    <th class="th-tl" style="width:80px">Tgl Brkt</th><th class="th-tl" style="width:50px">Jam</th>
    <th class="th-tl" style="width:80px">Tgl Tiba</th><th class="th-tl" style="width:50px">Jam</th>
    <th class="th-tl" style="width:50px">Durasi</th><th class="th-tl" style="width:90px">Harga/Org</th>
    <th class="th-tl" style="width:35px">Pax</th><th class="th-tl" style="width:90px">Subtotal</th>
    <th class="th-tl" style="width:70px">Status</th><th class="th-tl" style="width:90px">Aksi</th>
  </tr></thead><tbody id="tb-trains">`;
    S.trains.forEach((t, i) => {
      h += `<tr draggable="true" data-type="train" data-id="${t.id}" ondragstart="dStart(event,'train','${t.id}')" ondragover="dOver(event)" ondrop="dDrop(event,'train')">
      <td><span class="drag-handle" title="Drag untuk reorder">☰</span></td><td>${i + 1}</td>
      <td style="font-weight:700;white-space:nowrap">${t.name}</td><td>${t.route}</td>
      <td>${fmtD(t.depDate)}</td><td style="font-weight:700">${t.depTime}</td>
      <td>${fmtD(t.arrDate)}</td><td style="font-weight:700">${t.arrTime}</td>
      <td>${dur(t.depDate, t.depTime, t.arrDate, t.arrTime)}</td>

  async function syncSave() {
    const payload = {
      transports: { trains: S.trains, hotels: S.hotels },
      itineraries: { days: S.days },
      budgets: { days: S.budgetDays, budgetAwal: S.budgetAwal },
      tripInfo: { params: S.params }
    };

    const form = new FormData();
    form.append('data', JSON.stringify(payload));

    const r = await fetch(GAS_URL + '?action=save', {
      method: 'POST',
      body: form
    });

    const j = await r.json();
  }

  async function syncLoad() {
    syncStatus = { ok: false, msg: 'Mengambil data dari Google Sheets...', time: new Date().toLocaleTimeString() };
    rSync();
    try {
      const r = await fetch(GAS_URL + '?action=load');
      const j = await r.json();
      if (j.status === 'success' && j.data) {
        const d = j.data;
        if (d.transports && d.transports.trains) S.trains = d.transports.trains;
        if (d.transports && d.transports.hotels) S.hotels = d.transports.hotels;
        if (d.itineraries && d.itineraries.days) S.days = d.itineraries.days;
        if (d.budgets && d.budgets.days) S.budgetDays = d.budgets.days;
        if (d.budgets && d.budgets.budgetAwal) S.budgetAwal = d.budgets.budgetAwal;
        if (d.tripInfo && d.tripInfo.params) S.params = d.tripInfo.params;
        await saveLocal();
        syncStatus = { ok: true, msg: 'Download berhasil! Data dari Google Sheets dimuat.', time: new Date().toLocaleTimeString() };
        render();
      } else {
        syncStatus = { ok: false, msg: 'Data kosong atau format tidak valid dari Sheets.', time: new Date().toLocaleTimeString() };
      }
    } catch (e) {
      syncStatus = { ok: false, msg: 'Gagal konek ke Google Sheets. Cek koneksi & URL Apps Script.', time: new Date().toLocaleTimeString() };
    }
    rSync();
  }

  function addDay() {
    const newId = NI.day++;
    S.days.push({ id: newId, label: 'Hari Baru ' + S.days.length, startTime: '08:00', activities: [] });
    S.budgetDays.push({ dayId: newId, items: [] });
    saveLocal(); rItin(); rBudget();
  }

  function delDay(id) {
    if (!confirm('Hapus hari ini beserta semua aktivitasnya?')) return;
    S.days = S.days.filter(d => d.id !== id);
    S.budgetDays = S.budgetDays.filter(b => b.dayId !== id);
    saveLocal(); render();
  }

  function dStart(e, type, id, dayId) {
    dragSrc = { type, id: String(id), dayId };
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => e.target.closest('tr').classList.add('dragging'), 0);
  }

  function dOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const tr = e.target.closest('tr');
    document.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
    if (tr) tr.classList.add('drag-over');
  }

  function dDrop(e, type, dayId) {
    e.preventDefault();
    document.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
    document.querySelectorAll('tr.dragging').forEach(r => r.classList.remove('dragging'));
    const target = e.target.closest('tr');
    if (!target || !dragSrc) return;

    if (type === 'train' && dragSrc.type === 'train') {
      const fromId = parseInt(dragSrc.id), toId = parseInt(target.dataset.id || '0');
      const fi = S.trains.findIndex(x => x.id === fromId), ti = S.trains.findIndex(x => x.id === toId);
      if (fi >= 0 && ti >= 0 && fi !== ti) { const [item] = S.trains.splice(fi, 1); S.trains.splice(ti, 0, item); }
    } else if (type === 'hotel' && dragSrc.type === 'hotel') {
      const fromId = parseInt(dragSrc.id), toId = parseInt(target.dataset.id || '0');
      const fi = S.hotels.findIndex(x => x.id === fromId), ti = S.hotels.findIndex(x => x.id === toId);
      if (fi >= 0 && ti >= 0 && fi !== ti) { const [item] = S.hotels.splice(fi, 1); S.hotels.splice(ti, 0, item); }
    } else if (type === 'act' && dragSrc.type === 'act') {
      const day = S.days.find(d => d.id === dayId);
      if (!day) return;
      const fromId = parseInt(dragSrc.id), toId = parseInt(target.dataset.aid || '0');
      const fi = day.activities.findIndex(x => x.id === fromId), ti = day.activities.findIndex(x => x.id === toId);
      if (fi >= 0 && ti >= 0 && fi !== ti) { const [item] = day.activities.splice(fi, 1); day.activities.splice(ti, 0, item); }
    } else if (type === 'budget' && dragSrc.type === 'budget') {
      const bd = S.budgetDays.find(b => b.dayId === dayId);
      if (!bd) return;
      const fromId = parseInt(dragSrc.id), toId = parseInt(target.dataset.bid || '0');
      const fi = bd.items.findIndex(x => x.id === fromId), ti = bd.items.findIndex(x => x.id === toId);
      if (fi >= 0 && ti >= 0 && fi !== ti) { const [item] = bd.items.splice(fi, 1); bd.items.splice(ti, 0, item); }
    }
    dragSrc = null; saveLocal(); render();
  }

  function om(type, mode, ...args) {
    MCX = { type, mode, args };
    document.getElementById('mbg').classList.add('open');
    const t = document.getElementById('mt'), b = document.getElementById('mb');
    if (type === 'train') {
      const d = mode === 'edit' ? S.trains.find(x => x.id === args[0]) : { name: '', route: '', depDate: '', depTime: '', arrDate: '', arrTime: '', price: 0, pax: 1, status: 'estimasi' };
      t.textContent = (mode === 'add' ? 'Tambah' : 'Edit') + ' tiket kereta';
      b.innerHTML = `<div class="fg"><div class="fld"><label>Nama Kereta</label><input id="fn" value="${d.name}"></div><div class="fld"><label>Rute</label><input id="fr" value="${d.route}"></div><div class="fld"><label>Tgl Berangkat</label><input type="date" id="fdd" value="${d.depDate}"></div><div class="fld"><label>Jam Berangkat</label><input type="time" id="fdt" value="${d.depTime}"></div><div class="fld"><label>Tgl Tiba</label><input type="date" id="fad" value="${d.arrDate}"></div><div class="fld"><label>Jam Tiba</label><input type="time" id="fat" value="${d.arrTime}"></div><div class="fld fhi"><label>Harga/Orang (Rp)</label><input type="number" id="fp" value="${d.price}"></div><div class="fld fhi"><label>Jumlah Penumpang</label><input type="number" id="fpx" value="${d.pax}" min="1"></div><div class="fld"><label>Status</label><select id="fs"><option value="estimasi"${d.status === 'estimasi' ? ' selected' : ''}>Estimasi</option><option value="konfirmasi"${d.status === 'konfirmasi' ? ' selected' : ''}>Konfirmasi</option></select></div></div>`;
    } else if (type === 'hotel') {
      const d = mode === 'edit' ? S.hotels.find(x => x.id === args[0]) : { name: '', city: '', checkIn: '', checkOut: '', pricePerNight: 0, status: 'estimasi' };
      t.textContent = (mode === 'add' ? 'Tambah' : 'Edit') + ' penginapan';
      b.innerHTML = `<div class="fg"><div class="fld"><label>Nama Penginapan</label><input id="fn" value="${d.name}"></div><div class="fld"><label>Kota</label><input id="fc" value="${d.city}"></div><div class="fld"><label>Tgl Check-in</label><input type="date" id="fci" value="${d.checkIn}"></div><div class="fld"><label>Tgl Check-out</label><input type="date" id="fco" value="${d.checkOut}"></div><div class="fld fhi"><label>Harga/Malam (Rp)</label><input type="number" id="fp" value="${d.pricePerNight}"></div><div class="fld"><label>Status</label><select id="fs"><option value="estimasi"${d.status === 'estimasi' ? ' selected' : ''}>Estimasi</option><option value="konfirmasi"${d.status === 'konfirmasi' ? ' selected' : ''}>Konfirmasi</option></select></div></div>`;
    } else if (type === 'activity') {
      const dayId = args[0], actId = args[1];
      const day = S.days.find(d => d.id === dayId);
      const d = mode === 'edit' ? (day ? day.activities.find(x => x.id === actId) : null) || {} : { act: '', loc: '', base: 0, dur: 30 };
      t.textContent = (mode === 'add' ? 'Tambah' : 'Edit') + ' aktivitas — ' + (day ? day.label : '');
      b.innerHTML = `<div class="fg fg1"><div class="fld"><label>Nama Aktivitas</label><input id="fa" value="${d.act || ''}"></div><div class="fld"><label>Lokasi</label><input id="fl" value="${d.loc || ''}"></div></div><div class="fg"><div class="fld fhi"><label>Perjalanan Dasar (menit)</label><input type="number" id="fb" value="${d.base || 0}" min="0"></div><div class="fld fhi"><label>Durasi Aktivitas (menit)</label><input type="number" id="fd" value="${d.dur || 30}" min="0"></div></div><p style="font-size:10px;color:#64748B;margin-top:8px">Aktual = Dasar × Faktor (${S.params.faktor}x). Ubah faktor di Adjustment.</p>`;
    } else if (type === 'budget') {
      const dayId = args[0], itemId = args[1];
      const bd = S.budgetDays.find(b => b.dayId === dayId);
      const day = S.days.find(d => d.id === dayId);
      const d = mode === 'edit' ? (bd ? bd.items.find(x => x.id === itemId) : null) || {} : { cat: '', amount: 0 };
      t.textContent = (mode === 'add' ? 'Tambah' : 'Edit') + ' budget — ' + (day ? day.label : '');
      b.innerHTML = `<div class="fg fg1"><div class="fld"><label>Kategori</label><input id="fcat" value="${d.cat || ''}"></div><div class="fld fhi"><label>Budget (Rp)</label><input type="number" id="fam" value="${d.amount || 0}" min="0"></div></div>`;
    }
  }

  function cm() { document.getElementById('mbg').classList.remove('open'); }

  function sm() {
    const { type, mode, args } = MCX;
    const g = id => document.getElementById(id)?.value || '';
    const gn = id => parseFloat(document.getElementById(id)?.value) || 0;
    const gi = id => parseInt(document.getElementById(id)?.value) || 0;
    if (type === 'train') {
      const o = { name: g('fn'), route: g('fr'), depDate: g('fdd'), depTime: g('fdt'), arrDate: g('fad'), arrTime: g('fat'), price: gn('fp'), pax: gi('fpx') || 1, status: g('fs') };
      if (mode === 'add') { o.id = NI.tr++; S.trains.push(o); } else { const i = S.trains.findIndex(x => x.id === args[0]); if (i >= 0) { o.id = args[0]; S.trains[i] = o; } }
    } else if (type === 'hotel') {
      const o = { name: g('fn'), city: g('fc'), checkIn: g('fci'), checkOut: g('fco'), pricePerNight: gn('fp'), status: g('fs') };
      if (mode === 'add') { o.id = NI.ht++; S.hotels.push(o); } else { const i = S.hotels.findIndex(x => x.id === args[0]); if (i >= 0) { o.id = args[0]; S.hotels[i] = o; } }
    } else if (type === 'activity') {
      const dayId = args[0], actId = args[1];
      const day = S.days.find(d => d.id === dayId);
      if (!day) return cm();
      const o = { act: g('fa'), loc: g('fl'), base: gi('fb'), dur: gi('fd') };
      if (mode === 'add') { o.id = NI.act++; day.activities.push(o); } else { const i = day.activities.findIndex(x => x.id === actId); if (i >= 0) { o.id = actId; day.activities[i] = o; } }
    } else if (type === 'budget') {
      const dayId = args[0], itemId = args[1];
      let bd = S.budgetDays.find(b => b.dayId === dayId);
      if (!bd) { bd = { dayId, items: [] }; S.budgetDays.push(bd); }
      const o = { cat: g('fcat'), amount: gn('fam') };
      if (mode === 'add') { o.id = NI.bu++; bd.items.push(o); } else { const i = bd.items.findIndex(x => x.id === itemId); if (i >= 0) { o.id = itemId; bd.items[i] = o; } }
    }
    saveLocal(); render(); cm();
  }

  function di(type, ...args) {
    if (!confirm('Hapus item ini?')) return;
    if (type === 'train') S.trains = S.trains.filter(x => x.id !== args[0]);
    else if (type === 'hotel') S.hotels = S.hotels.filter(x => x.id !== args[0]);
    else if (type === 'act') { const day = S.days.find(d => d.id === args[0]); if (day) day.activities = day.activities.filter(x => x.id !== args[1]); }
    else if (type === 'budget') { const bd = S.budgetDays.find(b => b.dayId === args[0]); if (bd) bd.items = bd.items.filter(x => x.id !== args[1]); }
    saveLocal(); render();
  }

  document.getElementById('mbg').addEventListener('click', function (e) { if (e.target === this) cm(); });

  loadLocal().then(() => render());
</script>

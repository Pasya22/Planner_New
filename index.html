<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Travel Planner Pro - Bandung Weekend</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', Arial, sans-serif;
      background: #F8FAFC;
      color: #1E293B;
      font-size: 14px;
      line-height: 1.4;
    }

    :root {
      --or: #F97316;
      --ord: #C2410C;
      --nv: #1E293B;
      --nv2: #1E3A5F;
      --tl: #0E7490;
      --gn: #166534;
      --pu: #7C3AED;
      --rd: #DC2626;
      --bd: #E2E8F0;
      --alt: #F1F5F9;
      --wh: #fff;
      --ab: #FEF3C7;
      --ib: #1D4ED8;
    }

    /* Mobile First */
    .container {
      max-width: 100%;
      margin: 0 auto;
    }

    /* Header */
    .hdr {
      background: #1E293B;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 3px solid var(--or);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }

    .hdr h1 {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
    }

    .hd-sub {
      font-size: 10px;
      color: #94A3B8;
      width: 100%;
      margin-top: 4px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
    }

    .bg-or {
      background: var(--or);
    }

    .bg-tl {
      background: var(--tl);
    }

    .bg-gn {
      background: var(--gn);
    }

    .bg-pu {
      background: var(--pu);
    }

    /* Tabs - Mobile Scroll */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--bd);
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      position: sticky;
      top: 70px;
      z-index: 99;
    }

    .tab {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: #64748B;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tab.on {
      color: var(--or);
      border-bottom-color: var(--or);
    }

    .tab:active {
      background: var(--alt);
    }

    /* Panels */
    .pnl {
      display: none;
      padding: 12px;
    }

    .pnl.on {
      display: block;
    }

    /* Status Bar */
    .status-bar {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-bar.loading {
      background: #EFF6FF;
      color: #1E3A5F;
      border-left: 3px solid var(--tl);
    }

    .status-bar.success {
      background: #DCFCE7;
      color: #166534;
      border-left: 3px solid var(--gn);
    }

    .status-bar.error {
      background: #FEE2E2;
      color: #991B1B;
      border-left: 3px solid var(--rd);
    }

    .status-bar.synced {
      background: #FEF3C7;
      color: #92400E;
      border-left: 3px solid #F59E0B;
    }

    /* Buttons */
    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .b-add {
      background: #fff;
      color: var(--or);
      border: 1.5px solid var(--or);
    }

    .b-add:active {
      background: var(--or);
      color: #fff;
    }

    .b-sv {
      background: var(--gn);
      color: #fff;
    }

    .b-cc {
      background: var(--alt);
      color: var(--nv);
      border: 1px solid var(--bd);
    }

    .b-reset {
      background: #FEE2E2;
      color: var(--rd);
      border: 1px solid #FCA5A5;
    }

    /* Tables - Mobile Responsive */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 600px;
    }

    /* Mobile card view for small screens */
    @media (max-width: 640px) {
      table {
        min-width: 500px;
      }
    }

    th {
      padding: 10px 8px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    .th-tl {
      background: var(--tl);
    }

    .th-gn {
      background: var(--gn);
    }

    .th-pu {
      background: var(--pu);
    }

    .th-or {
      background: var(--or);
    }

    td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--bd);
      vertical-align: middle;
    }

    tr:nth-child(even) td {
      background: var(--alt);
    }

    .tr-tot td {
      background: var(--ord) !important;
      color: #fff;
      font-weight: 700;
    }

    .tr-gnd td {
      background: var(--or) !important;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
    }

    .mn {
      text-align: right;
      font-weight: 700;
    }

    .iab {
      background: var(--ab);
      color: var(--ib);
      font-weight: 700;
    }

    /* Action buttons */
    .ce,
    .cd {
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      display: inline-block;
      margin: 0 2px;
    }

    .ce {
      background: #FEF3C7;
      color: #92400E;
      border: 1px solid #F59E0B;
    }

    .cd {
      background: #FEE2E2;
      color: var(--rd);
      border: 1px solid #FCA5A5;
    }

    .ce:active,
    .cd:active {
      opacity: 0.7;
    }

    /* Drag handle */
    .drag-handle {
      cursor: grab;
      color: #94A3B8;
      font-size: 16px;
      user-select: none;
      display: inline-block;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    /* Modal */
    .mbg {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      overflow-y: auto;
    }

    .mbg.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--or);
      padding-bottom: 8px;
    }

    /* Form grid */
    .fg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .fg1 {
      grid-template-columns: 1fr;
    }

    .fld {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .fld label {
      font-size: 11px;
      font-weight: 700;
      color: #64748B;
    }

    .fld input,
    .fld select {
      padding: 8px 10px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
    }

    .fld input:focus,
    .fld select:focus {
      border-color: var(--or);
    }

    .fhi input,
    .fhi select {
      background: var(--ab);
      color: var(--ib);
      font-weight: 700;
      border-color: #F59E0B;
    }

    .mact {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--bd);
    }

    /* Cards for summary */
    .ac {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .acard {
      background: #fff;
      border: 1.5px solid var(--bd);
      border-radius: 12px;
      padding: 12px;
      flex: 1;
      min-width: 100px;
      text-align: center;
    }

    .al {
      font-size: 11px;
      color: #64748B;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .av {
      font-size: 16px;
      font-weight: 700;
    }

    /* Parameter rows */
    .pr {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: var(--alt);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    @media (min-width: 640px) {
      .pr {
        grid-template-columns: 180px 200px 1fr;
      }
    }

    .pr label {
      font-size: 12px;
      font-weight: 700;
    }

    .pr input {
      padding: 8px 10px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-size: 12px;
      background: var(--ab);
      color: var(--ib);
      font-weight: 700;
      outline: none;
      width: 100%;
    }

    .pr .ht {
      font-size: 10px;
      color: #64748B;
      font-style: italic;
      grid-column: 1 / -1;
    }

    @media (min-width: 640px) {
      .pr .ht {
        grid-column: auto;
      }
    }

    /* Day header */
    .day-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--or);
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .day-hdr .d-title {
      font-size: 13px;
      font-weight: 700;
      flex: 1;
    }

    .day-hdr input[type="time"],
    .day-hdr input[type="text"] {
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    .day-hdr input[type="text"] {
      width: 130px;
    }

    .del-day {
      background: rgba(220, 38, 38, 0.3);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
    }

    /* Info box */
    .ib {
      background: #EFF6FF;
      border-left: 3px solid var(--tl);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 11px;
      color: #1E3A5F;
      margin-bottom: 12px;
    }

    /* Section header */
    .sbar {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bg-nv {
      background: var(--nv2);
    }

    .bg-gn2 {
      background: var(--gn);
    }

    .bg-pu2 {
      background: var(--pu);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top-color: var(--or);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Drag states */
    .drag-over td {
      background: #FEF3C7 !important;
      border-top: 2px solid var(--or);
    }

    .dragging td {
      opacity: 0.4;
      background: #EDE9FE !important;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="hdr">
      <span style="font-size:20px">🗺️</span>
      <div style="flex:1">
        <h1>Travel Planner Pro</h1>
        <div class="hd-sub">Bandung Weekend Escape · Live Sync ke Sheets</div>
      </div>
      <span class="badge bg-or">CRUD</span>
      <span class="badge bg-tl">DRAG</span>
      <span class="badge bg-gn">LIVE</span>
    </div>

    <div class="tabs">
      <div class="tab on" onclick="switchTab('master')">📋 Master</div>
      <div class="tab" onclick="switchTab('itin')">🗺️ Itinerary</div>
      <div class="tab" onclick="switchTab('budget')">💰 Budget</div>
      <div class="tab" onclick="switchTab('adj')">⚙️ Adjustment</div>
    </div>

    <div id="statusBar" class="status-bar loading">
      <span>🔄 Memuat data dari Google Sheets...</span>
    </div>

    <div id="p-master" class="pnl on"></div>
    <div id="p-itin" class="pnl"></div>
    <div id="p-budget" class="pnl"></div>
    <div id="p-adj" class="pnl"></div>
  </div>

  <div class="mbg" id="mbg">
    <div class="modal">
      <h3 id="mt">Form</h3>
      <div id="mb"></div>
      <div class="mact">
        <button class="btn b-cc" onclick="closeModal()">Batal</button>
        <button class="btn b-sv" onclick="saveModal()">Simpan</button>
      </div>
    </div>
  </div>

  <script>
    // Google Apps Script URL (GANTI DENGAN URL DEPLOY ANDA)
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzwBqHsm10ZufbBMHzNOqUreo8jpfCBjK28ZWQ9Pqsl3_nFeQAx3Ns0TNU1Z4maLQIP/exec';

    let S = {
      trains: [],
      hotels: [],
      params: { faktor: 1.0, speed: 30, consumption: 35, fuelPrice: 10000 },
      days: [],
      budgetDays: [],
      budgetAwal: 2500000
    };

    let nextIds = { tr: 1, ht: 1, day: 1, act: 1, bu: 1 };
    let modalContext = null;
    let dragSrc = null;
    let isLoading = false;

    // Helper functions
    const rp = (n) => 'Rp ' + Math.round(n).toLocaleString('id-ID');
    const fmtD = (d) => {
      if (!d) return '-';
      const [y, m, dd] = d.split('-');
      const mn = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agt', 'Sep', 'Okt', 'Nov', 'Des'];
      return dd + ' ' + mn[parseInt(m) - 1] + ' ' + y;
    };
    const nights = (ci, co) => Math.max(0, Math.round((new Date(co) - new Date(ci)) / 86400000));
    const t2m = (t) => { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; };
    const m2t = (m) => { const h = Math.floor(m / 60) % 24, mm = m % 60; return String(h).padStart(2, '0') + ':' + String(mm).padStart(2, '0'); };
    const aMin = (b) => Math.round(b * (S.params.faktor || 1));
    const bbm = (day) => {
      const tot = day.activities.reduce((a, x) => a + aMin(x.base), 0);
      return Math.round(tot / 60 * S.params.speed / S.params.consumption * S.params.fuelPrice);
    };

    function showStatus(message, type = 'loading') {
      const bar = document.getElementById('statusBar');
      const icons = { loading: '🔄', success: '✅', error: '❌', synced: '☁️' };
      bar.innerHTML = `<span>${icons[type] || 'ℹ️'} ${message}</span>`;
      bar.className = `status-bar ${type}`;
      if (type !== 'loading') {
        setTimeout(() => {
          if (document.getElementById('statusBar').className === `status-bar ${type}`) {
            bar.className = 'status-bar';
            bar.innerHTML = '<span>✅ Data siap</span>';
          }
        }, 3000);
      }
    }

    // Load from Google Sheets
    async function loadFromSheets() {
      if (isLoading) return;
      isLoading = true;
      showStatus('Mengambil data dari Google Sheets...', 'loading');

      try {
        const response = await fetch(`${GAS_URL}?action=load&t=${Date.now()}`);
        const result = await response.json();

        if (result.status === 'success' && result.data) {
          const d = result.data;
          if (d.transports) {
            S.trains = d.transports.trains || [];
            S.hotels = d.transports.hotels || [];
          }
          if (d.itineraries && d.itineraries.days) S.days = d.itineraries.days;
          if (d.budgets) {
            S.budgetDays = d.budgets.days || [];
            S.budgetAwal = d.budgets.budgetAwal || 2500000;
          }
          if (d.tripInfo && d.tripInfo.params) S.params = d.tripInfo.params;

          // Update nextIds
          S.trains.forEach(t => { if (t.id >= nextIds.tr) nextIds.tr = t.id + 1; });
          S.hotels.forEach(h => { if (h.id >= nextIds.ht) nextIds.ht = h.id + 1; });
          S.days.forEach(d => {
            if (d.id >= nextIds.day) nextIds.day = d.id + 1;
            d.activities.forEach(a => { if (a.id >= nextIds.act) nextIds.act = a.id + 1; });
          });
          S.budgetDays.forEach(bd => {
            bd.items.forEach(i => { if (i.id >= nextIds.bu) nextIds.bu = i.id + 1; });
          });

          showStatus('Data berhasil dimuat dari Google Sheets!', 'success');
          renderAll();
        } else {
          showStatus('Gagal memuat data: ' + (result.message || 'Unknown error'), 'error');
          loadDefaultData();
        }
      } catch (err) {
        console.error('Load error:', err);
        showStatus('Gagal konek ke Google Sheets. Memuat data default...', 'error');
        loadDefaultData();
      }
      isLoading = false;
    }

    // Save to Google Sheets
    async function saveToSheets() {
      showStatus('Menyimpan ke Google Sheets...', 'loading');

      const payload = {
        transports: { trains: S.trains, hotels: S.hotels },
        itineraries: { days: S.days },
        budgets: { days: S.budgetDays, budgetAwal: S.budgetAwal },
        tripInfo: { params: S.params }
      };

      const formData = new FormData();
      formData.append('action', 'save');
      formData.append('data', JSON.stringify(payload));

      try {
        const response = await fetch(GAS_URL, { method: 'POST', body: formData });
        const result = await response.json();

        if (result.status === 'success') {
          showStatus('Data berhasil disimpan ke Google Sheets!', 'success');
        } else {
          showStatus('Gagal menyimpan: ' + (result.message || 'Unknown error'), 'error');
        }
      } catch (err) {
        console.error('Save error:', err);
        showStatus('Gagal menyimpan ke Google Sheets!', 'error');
      }
    }

    // Load default data
    function loadDefaultData() {
      S = {
        trains: [
          { id: 1, name: "Sri Tanjung (Ekonomi)", route: "Wonokromo → Lempuyangan", depDate: "2026-07-01", depTime: "14:39", arrDate: "2026-07-01", arrTime: "19:33", price: 150000, pax: 2, status: "estimasi" },
          { id: 2, name: "Lodaya (Eksekutif)", route: "Yogyakarta → Bandung", depDate: "2026-07-02", depTime: "20:01", arrDate: "2026-07-03", arrTime: "03:14", price: 220000, pax: 2, status: "estimasi" },
          { id: 3, name: "Malabar (Eksekutif)", route: "Bandung → Malang", depDate: "2026-07-05", depTime: "18:10", arrDate: "2026-07-06", arrTime: "06:52", price: 180000, pax: 2, status: "estimasi" },
        ],
        hotels: [
          { id: 1, name: "Penginapan Yogyakarta (Transit)", city: "Yogyakarta", checkIn: "2026-07-01", checkOut: "2026-07-02", pricePerNight: 89000, status: "konfirmasi" },
          { id: 2, name: "Dreamstay Bandung", city: "Bandung", checkIn: "2026-07-03", checkOut: "2026-07-05", pricePerNight: 0, status: "estimasi" },
        ],
        params: { faktor: 1.0, speed: 30, consumption: 35, fuelPrice: 10000 },
        days: [
          {
            id: 1, label: "Jumat, 03 Jul 2026", startTime: "06:00", activities: [
              { id: 1, act: "Sarapan Bubur Kang Dedi", loc: "Jl. Sudirman", base: 15, dur: 40 },
              { id: 2, act: "Beli Pukis Lumer", loc: "Leuwi Panjang", base: 20, dur: 15 },
              { id: 3, act: "Titip Koper", loc: "Dreamstay", base: 15, dur: 10 },
              { id: 4, act: "Ke Al Jabbar", loc: "Bandung Timur", base: 25, dur: 45 },
            ]
          },
          {
            id: 2, label: "Sabtu, 04 Jul 2026", startTime: "03:00", activities: [
              { id: 1, act: "Bangun & Beli Bekal", loc: "Dreamstay", base: 5, dur: 15 },
              { id: 2, act: "Berangkat ke Cukul", loc: "Pangalengan", base: 90, dur: 0 },
              { id: 3, act: "Sunrise Point", loc: "Sunrise Point Cukul", base: 0, dur: 120 },
            ]
          },
        ],
        budgetDays: [],
        budgetAwal: 2500000,
      };
      S.budgetDays = S.days.map(d => ({ dayId: d.id, items: [] }));
      renderAll();
      saveToSheets();
    }

    // CRUD Operations with auto-save
    async function mutate(callback) {
      callback();
      renderAll();
      await saveToSheets();
    }

    function addDay() {
      mutate(() => {
        const newId = nextIds.day++;
        S.days.push({ id: newId, label: 'Hari Baru ' + (S.days.length + 1), startTime: '08:00', activities: [] });
        S.budgetDays.push({ dayId: newId, items: [] });
      });
    }

    function delDay(id) {
      if (!confirm('Hapus hari ini beserta semua aktivitasnya?')) return;
      mutate(() => {
        S.days = S.days.filter(d => d.id !== id);
        S.budgetDays = S.budgetDays.filter(b => b.dayId !== id);
      });
    }

    function deleteItem(type, ...args) {
      if (!confirm('Hapus item ini?')) return;
      mutate(() => {
        if (type === 'train') S.trains = S.trains.filter(x => x.id !== args[0]);
        else if (type === 'hotel') S.hotels = S.hotels.filter(x => x.id !== args[0]);
        else if (type === 'act') {
          const day = S.days.find(d => d.id === args[0]);
          if (day) day.activities = day.activities.filter(x => x.id !== args[1]);
        }
        else if (type === 'budget') {
          const bd = S.budgetDays.find(b => b.dayId === args[0]);
          if (bd) bd.items = bd.items.filter(x => x.id !== args[1]);
        }
      });
    }

    // Drag & Drop
    function onDragStart(e, type, id, dayId) {
      dragSrc = { type, id: String(id), dayId };
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => e.target.closest('tr')?.classList.add('dragging'), 0);
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const tr = e.target.closest('tr');
      document.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
      if (tr) tr.classList.add('drag-over');
    }

    function onDrop(e, type, dayId) {
      e.preventDefault();
      document.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
      document.querySelectorAll('tr.dragging').forEach(r => r.classList.remove('dragging'));
      const target = e.target.closest('tr');
      if (!target || !dragSrc) return;

      mutate(() => {
        if (type === 'train' && dragSrc.type === 'train') {
          const fromId = parseInt(dragSrc.id), toId = parseInt(target.dataset.id);
          const fi = S.trains.findIndex(x => x.id === fromId);
          const ti = S.trains.findIndex(x => x.id === toId);
          if (fi >= 0 && ti >= 0 && fi !== ti) {
            const [item] = S.trains.splice(fi, 1);
            S.trains.splice(ti, 0, item);
          }
        } else if (type === 'hotel' && dragSrc.type === 'hotel') {
          const fromId = parseInt(dragSrc.id), toId = parseInt(target.dataset.id);
          const fi = S.hotels.findIndex(x => x.id === fromId);
          const ti = S.hotels.findIndex(x => x.id === toId);
          if (fi >= 0 && ti >= 0 && fi !== ti) {
            const [item] = S.hotels.splice(fi, 1);
            S.hotels.splice(ti, 0, item);
          }
        } else if (type === 'act' && dragSrc.type === 'act') {
          const day = S.days.find(d => d.id === dayId);
          if (day) {
            const fromId = parseInt(dragSrc.id), toId = parseInt(target.dataset.aid);
            const fi = day.activities.findIndex(x => x.id === fromId);
            const ti = day.activities.findIndex(x => x.id === toId);
            if (fi >= 0 && ti >= 0 && fi !== ti) {
              const [item] = day.activities.splice(fi, 1);
              day.activities.splice(ti, 0, item);
            }
          }
        }
      });
      dragSrc = null;
    }

        body.innerHTML = `<div class="fg"><div class="fld"><label>Nama Kereta</label><input id="fn" value="${d.name || ''}"></div><div class="fld"><label>Rute</label><input id="fr" value="${d.route || ''}"></div><div class="fld"><label>Tgl Berangkat</label><input type="date" id="fdd" value="${d.depDate || ''}"></div><div class="fld"><label>Jam Berangkat</label><input type="time" id="fdt" value="${d.depTime || ''}"></div><div class="fld"><label>Tgl Tiba</label><input type="date" id="fad" value="${d.arrDate || ''}"></div><div class="fld"><label>Jam Tiba</label><input type="time" id="fat" value="${d.arrTime || ''}"></div><div class="fld fhi"><label>Harga/Orang (Rp)</label><input type="number" id="fp" value="${d.price || 0}"></div><div class="fld fhi"><label>Jumlah Penumpang</label><input type="number" id="fpx" value="${d.pax || 1}" min="1"></div><div class="fld"><label>Status</label><select id="fs"><option value="estimasi"${d.status === 'estimasi' ? ' selected' : ''}>Estimasi</option><option value="konfirmasi"${d.status === 'konfirmasi' ? ' selected' : ''}>Konfirmasi</option></select></div></div>`;
      } else if (type === 'hotel') {

      } else if (type === 'activity') {
        const dayId = args[0], actId = args[1];
        const day = S.days.find(d => d.id === dayId);
        const d = mode === 'edit' && day ? day.activities.find(x => x.id === actId) || {} : { act: '', loc: '', base: 0, dur: 30 };
        title.textContent = (mode === 'add' ? 'Tambah' : 'Edit') + ' Aktivitas';
        body.innerHTML = `<div class="fg fg1"><div class="fld"><label>Nama Aktivitas</label><input id="fa" value="${d.act || ''}"></div><div class="fld"><label>Lokasi</label><input id="fl" value="${d.loc || ''}"></div></div><div class="fg"><div class="fld fhi"><label>Perjalanan Dasar (menit)</label><input type="number" id="fb" value="${d.base || 0}" min="0"></div><div class="fld fhi"><label>Durasi Aktivitas (menit)</label><input type="number" id="fd" value="${d.dur || 30}" min="0"></div></div>`;
      } else if (type === 'budget') {
        const dayId = args[0], itemId = args[1];
        const bd = S.budgetDays.find(b => b.dayId === dayId);
        const d = mode === 'edit' && bd ? bd.items.find(x => x.id === itemId) || {} : { cat: '', amount: 0 };
        title.textContent = (mode === 'add' ? 'Tambah' : 'Edit') + ' Budget';
        body.innerHTML = `<div class="fg fg1"><div class="fld"><label>Kategori</label><input id="fcat" value="${d.cat || ''}"></div><div class="fld fhi"><label>Budget (Rp)</label><input type="number" id="fam" value="${d.amount || 0}" min="0"></div></div>`;

    function closeModal() {
      document.getElementById('mbg').classList.remove('open');
      modalContext = null;
    }

    function saveModal() {
      const { type, mode, args } = modalContext;
      const getVal = (id) => document.getElementById(id)?.value || '';
      const getNum = (id) => parseFloat(document.getElementById(id)?.value) || 0;
      const getInt = (id) => parseInt(document.getElementById(id)?.value) || 1;

      mutate(() => {
        if (type === 'train') {
          const obj = {
            name: getVal('fn'), route: getVal('fr'), depDate: getVal('fdd'), depTime: getVal('fdt'),
            arrDate: getVal('fad'), arrTime: getVal('fat'), price: getNum('fp'), pax: getInt('fpx'), status: getVal('fs')
          };
          if (mode === 'add') { obj.id = nextIds.tr++; S.trains.push(obj); }
          else { const idx = S.trains.findIndex(x => x.id === args[0]); if (idx >= 0) { obj.id = args[0]; S.trains[idx] = obj; } }
        } else if (type === 'hotel') {
          const obj = {
            name: getVal('fn'), city: getVal('fc'), checkIn: getVal('fci'), checkOut: getVal('fco'),
            pricePerNight: getNum('fp'), status: getVal('fs')
          };
          if (mode === 'add') { obj.id = nextIds.ht++; S.hotels.push(obj); }
          else { const idx = S.hotels.findIndex(x => x.id === args[0]); if (idx >= 0) { obj.id = args[0]; S.hotels[idx] = obj; } }
        } else if (type === 'activity') {
          const dayId = args[0];
          const day = S.days.find(d => d.id === dayId);
          if (day) {
            const obj = { act: getVal('fa'), loc: getVal('fl'), base: getInt('fb'), dur: getInt('fd') };
            if (mode === 'add') { obj.id = nextIds.act++; day.activities.push(obj); }
            else { const idx = day.activities.findIndex(x => x.id === args[1]); if (idx >= 0) { obj.id = args[1]; day.activities[idx] = obj; } }
          }
        } else if (type === 'budget') {
          const dayId = args[0];
          let bd = S.budgetDays.find(b => b.dayId === dayId);
          if (!bd) { bd = { dayId, items: [] }; S.budgetDays.push(bd); }
          const obj = { cat: getVal('fcat'), amount: getNum('fam') };
          if (mode === 'add') { obj.id = nextIds.bu++; bd.items.push(obj); }
          else { const idx = bd.items.findIndex(x => x.id === args[1]); if (idx >= 0) { obj.id = args[1]; bd.items[idx] = obj; } }
        }
      });
      closeModal();
    }
